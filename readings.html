<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Stats</title>
<style>
  body {
    background: #fff;
    color: #000;
    font-family: Cambria, Georgia, "Times New Roman", serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* Box is sized to exactly match the aspect ratio of the reference
     image (942 x 492 px). Scale this whole element down later with
     a CSS transform/zoom if you need it smaller on screen — the
     internal layout below is all in the same px coordinate space,
     so it scales together. */
  .stats-box {
    position: relative;
    width: 942px;
    height: 492px;
    background: #fff;
    border: 4px solid #7B1FA2;
    box-sizing: border-box;
    color: #000;
  }

  .stat {
    position: absolute;
  }

  .stat-icon {
    position: absolute;
  }

  .stat-icon svg,
  .stat-icon img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .stat-num {
    font-size: 44px;
    line-height: 1;
    white-space: nowrap;
  }

  .unit-mm {
    font-size: 31px;
  }

  .stack {
    display: inline-flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 17px;
    line-height: 1;
    text-align: center;
  }

  .row {
    display: flex;
    align-items: center;
  }

  .row.baseline {
    align-items: baseline;
  }

  .gap-sm {
    margin-left: 4px;
  }
</style>
</head>
<body>

<div class="stats-box" id="statsBox">

  <!-- THERMOMETER + TEMPERATURE -->
  <div class="stat-icon" style="left:145px; top:96px; width:43px; height:135px;">
    <img src="assets/icon temp.svg" alt="temperature">
  </div>
  <div class="stat row baseline" style="left:192px; top:100px;">
    <span class="stat-num" id="tempVal"></span>
  </div>

  <!-- WIND -->
  <div class="stat-icon" style="left:231px; top:317px; width:105px; height:77px;">
    <img src="assets/icon wind.svg" alt="wind">
  </div>
  <div class="stat row" style="left:146px; top:340px; align-items:flex-end;">
    <span class="stat-num" id="windVal"></span>
    <span class="stack gap-sm" style="height:32px; position:relative; top:-6px; left:2px;"><span>km</span><span>h</span></span>
  </div>

  <!-- RAINDROP -->
  <div class="stat-icon" style="left:532px; top:205px; width:44px; height:130px;">
    <img src="assets/icon rain.svg" alt="rain">
  </div>
  <div class="stat row baseline" style="left:502px; top:338px;">
    <span class="stat-num" id="rainVal"></span>
    <span class="unit-mm gap-sm">mm</span>
  </div>

  <!-- HUMIDITY -->
  <div class="stat row baseline" style="left:711px; top:309px;">
    <span class="stat-num" id="humidityVal"></span>
    <span class="stat-num gap-sm">%</span>
  </div>
  <div class="stat-icon" style="left:709px; top:358px; width:89px; height:116px;">
    <img src="assets/icon humid.svg" alt="humidity">
  </div>

</div>

<script>
  // ===================================================================
  // EDIT THE NUMBERS HERE — that's the only thing you should need to touch.
  // ===================================================================
  const TEMP_C       = 24;
  const WIND_KMH      = 15;
  const RAIN_MM       = 19;
  const HUMIDITY_PCT  = 18;
  // ===================================================================

  document.getElementById('tempVal').textContent = TEMP_C + ' °C';
  document.getElementById('windVal').textContent = WIND_KMH;
  document.getElementById('rainVal').textContent = RAIN_MM;
  document.getElementById('humidityVal').textContent = HUMIDITY_PCT;
</script>

</body>
</html>
